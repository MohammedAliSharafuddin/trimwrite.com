<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TrimWrite Flow</title>
    <style>
      :root {
        --bg: #f3eef8;
        --ink: #130d1d;
        --muted: #6d6677;
        --plum: #412160;
        --plum-soft: #f6f0fc;
        --line: rgba(19, 13, 29, 0.12);
        --paper: #fffdfd;
        --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        --sans: "IBM Plex Sans", "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1280px;
        height: 820px;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 88% 10%, rgba(65, 33, 96, 0.14), transparent 26%),
          linear-gradient(180deg, #fbf8ff 0%, var(--bg) 100%);
        font-family: var(--sans);
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 42px;
      }

      .window {
        height: 100%;
        border-radius: 30px;
        background: rgba(255, 253, 253, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 24px 72px rgba(19, 13, 29, 0.12);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 26px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.8);
      }

      .brand strong {
        display: block;
        font-size: 28px;
        letter-spacing: -0.03em;
      }

      .brand span {
        color: var(--muted);
        font-size: 16px;
      }

      .steps {
        display: flex;
        gap: 10px;
      }

      .step {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #fff;
        font-family: var(--mono);
        font-size: 15px;
      }

      .step.active {
        color: #fff;
        border-color: var(--plum);
        background: var(--plum);
      }

      .score-pill {
        min-width: 130px;
        padding: 12px 18px;
        border-radius: 999px;
        background: rgba(65, 33, 96, 0.08);
        color: var(--plum);
        font-family: var(--mono);
        font-size: 15px;
        text-align: center;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
        height: calc(100% - 86px);
        padding: 22px;
      }

      .pane {
        display: flex;
        flex-direction: column;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--paper);
        overflow: hidden;
      }

      .pane-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 15px;
      }

      .draft-body {
        flex: 1;
        padding: 28px;
        background: linear-gradient(180deg, rgba(65, 33, 96, 0.05) 0%, transparent 100%);
      }

      .draft-text {
        font-size: 30px;
        line-height: 1.55;
        letter-spacing: -0.035em;
      }

      .hl {
        padding: 0 6px 2px;
        border-radius: 10px;
      }

      .hl-vague {
        background: rgba(212, 141, 28, 0.18);
      }

      .hl-ai {
        background: rgba(122, 72, 169, 0.18);
      }

      .hl-fluff {
        background: rgba(201, 86, 55, 0.16);
      }

      .analysis-body {
        flex: 1;
        padding: 24px;
      }

      .placeholder,
      .review {
        height: 100%;
        border-radius: 22px;
      }

      .placeholder {
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, rgba(65, 33, 96, 0.05), rgba(65, 33, 96, 0.02));
        color: var(--muted);
      }

      .placeholder strong {
        display: block;
        margin-bottom: 12px;
        color: var(--ink);
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .review {
        padding: 24px;
        background: linear-gradient(180deg, rgba(65, 33, 96, 0.05), rgba(255, 255, 255, 0.9));
      }

      .score-card {
        padding: 18px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid rgba(65, 33, 96, 0.14);
      }

      .score-card span {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 14px;
      }

      .score-card strong {
        font-size: 48px;
        letter-spacing: -0.04em;
      }

      .issue-list,
      .rewrite {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }

      .issue,
      .rewrite-card {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(65, 33, 96, 0.12);
      }

      .issue span,
      .rewrite-card span {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 13px;
      }

      .issue strong,
      .rewrite-card strong {
        font-size: 21px;
        line-height: 1.3;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="window">
        <div class="topbar">
          <div class="brand">
            <strong>TrimWrite</strong>
            <span>Find the phrases that need a cleaner second pass</span>
          </div>

          <div class="steps">
            <div class="step" data-step="draft">DRAFT</div>
            <div class="step" data-step="check">CHECK</div>
            <div class="step" data-step="output">OUTPUT</div>
          </div>

          <div class="score-pill" id="score-pill">Waiting for draft</div>
        </div>

        <div class="workspace">
          <section class="pane">
            <div class="pane-head">Draft input</div>
            <div class="draft-body">
              <div class="draft-text" id="draft-text"></div>
            </div>
          </section>

          <section class="pane">
            <div class="pane-head">Review output</div>
            <div class="analysis-body">
              <div id="analysis-state"></div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const plainDraft = `This overview uses a polished approach to explain the latest service update. The message feels smooth, but some phrases sound vague and over-produced.`;
      const highlightedDraft = `This overview uses a <span class="hl hl-ai">polished approach</span> to explain the latest service update. The message feels <span class="hl hl-vague">smooth</span>, but some phrases sound <span class="hl hl-vague">vague</span> and <span class="hl hl-fluff">over-produced</span>.`;
      const cleanedDraft = `This overview explains the latest service update in plain language. The message is direct, specific, and easier to trust.`;

      function setActive(step) {
        document.querySelectorAll('.step').forEach(element => {
          element.classList.toggle('active', element.dataset.step === step);
        });
      }

      function renderAnalysis(progress) {
        const panel = document.getElementById('analysis-state');
        const pill = document.getElementById('score-pill');

        if (progress < 0.34) {
          setActive('draft');
          pill.textContent = 'Waiting for draft';
          panel.innerHTML = `
            <div class="placeholder">
              <div>
                <strong>Paste the draft</strong>
                <div>Highlights and revision cues appear after analysis.</div>
              </div>
            </div>
          `;
          return;
        }

        if (progress < 0.7) {
          setActive('check');
          pill.textContent = 'Checking tone';
          panel.innerHTML = `
            <div class="review">
              <div class="score-card">
                <span>AI-shaped phrasing</span>
                <strong>47%</strong>
              </div>
              <div class="issue-list">
                <div class="issue">
                  <span>Flagged phrase</span>
                  <strong>polished approach</strong>
                </div>
                <div class="issue">
                  <span>Vague wording</span>
                  <strong>smooth, vague</strong>
                </div>
                <div class="issue">
                  <span>Tone note</span>
                  <strong>Too polished for a direct update</strong>
                </div>
              </div>
            </div>
          `;
          return;
        }

        setActive('output');
        pill.textContent = 'Output ready';
        panel.innerHTML = `
          <div class="review">
            <div class="score-card">
              <span>Cleaner revision</span>
              <strong>13%</strong>
            </div>
            <div class="rewrite">
              <div class="rewrite-card">
                <span>Revised version</span>
                <strong>${cleanedDraft}</strong>
              </div>
              <div class="rewrite-card">
                <span>Result</span>
                <strong>Clearer voice, fewer generic phrases, stronger trust.</strong>
              </div>
            </div>
          </div>
        `;
      }

      window.setSceneProgress = function(progress) {
        const draft = document.getElementById('draft-text');

        if (progress < 0.34) {
          const count = Math.max(
            1,
            Math.floor(plainDraft.length * Math.min(progress / 0.34, 1))
          );
          draft.textContent = plainDraft.slice(0, count);
        } else if (progress < 0.7) {
          draft.innerHTML = highlightedDraft;
        } else {
          draft.textContent = cleanedDraft;
        }

        renderAnalysis(progress);
      };

      window.setSceneProgress(0);
    </script>
  </body>
</html>
