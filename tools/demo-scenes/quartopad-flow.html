<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>QuartoPad Flow</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --ink: #14110d;
        --muted: #635d56;
        --forest: #184d37;
        --forest-soft: #e8f5ee;
        --line: rgba(20, 17, 13, 0.12);
        --paper: #fffdf9;
        --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
        --sans: "IBM Plex Sans", "Segoe UI", sans-serif;
        --serif: Georgia, "Times New Roman", serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1280px;
        height: 820px;
        overflow: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 10%, rgba(24, 77, 55, 0.14), transparent 24%),
          linear-gradient(180deg, #faf6ee 0%, var(--bg) 100%);
        font-family: var(--sans);
      }

      .wrap {
        width: 100%;
        height: 100%;
        padding: 42px;
      }

      .window {
        height: 100%;
        border-radius: 30px;
        background: rgba(255, 253, 249, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 24px 72px rgba(20, 17, 13, 0.12);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px 26px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.76);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .brand strong {
        font-size: 28px;
        letter-spacing: -0.03em;
      }

      .brand span {
        color: var(--muted);
        font-size: 16px;
      }

      .steps {
        display: flex;
        gap: 10px;
      }

      .step {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: #fff;
        font-family: var(--mono);
        font-size: 15px;
      }

      .step.active {
        color: #fff;
        border-color: var(--forest);
        background: var(--forest);
      }

      .render-pill {
        min-width: 140px;
        padding: 12px 18px;
        border-radius: 999px;
        background: var(--ink);
        color: #fff;
        font-family: var(--mono);
        font-size: 15px;
        text-align: center;
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        height: calc(100% - 86px);
        padding: 22px;
      }

      .pane {
        display: flex;
        flex-direction: column;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--paper);
        overflow: hidden;
      }

      .pane-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-family: var(--mono);
        font-size: 15px;
      }

      .editor-body {
        flex: 1;
        padding: 24px;
        background: linear-gradient(180deg, rgba(24, 77, 55, 0.06) 0%, transparent 100%);
      }

      .editor-text {
        margin: 0;
        white-space: pre-wrap;
        font-family: var(--mono);
        font-size: 28px;
        line-height: 1.55;
        letter-spacing: -0.04em;
      }

      .caret {
        display: inline-block;
        width: 14px;
        height: 30px;
        margin-left: 4px;
        transform: translateY(4px);
        background: var(--forest);
      }

      .preview-body {
        flex: 1;
        padding: 26px;
      }

      .preview-state {
        height: 100%;
      }

      .waiting,
      .rendering {
        display: grid;
        place-items: center;
        height: 100%;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(24, 77, 55, 0.05), rgba(24, 77, 55, 0.02));
        color: var(--muted);
      }

      .waiting strong,
      .rendering strong {
        display: block;
        margin-bottom: 12px;
        color: var(--ink);
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .render-bar {
        width: 360px;
        height: 18px;
        margin-top: 18px;
        border-radius: 999px;
        background: rgba(20, 17, 13, 0.08);
        overflow: hidden;
      }

      .render-bar span {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--forest), #2d7e5c);
      }

      .report {
        height: 100%;
        border-radius: 22px;
        background: linear-gradient(180deg, rgba(24, 77, 55, 0.05), rgba(255, 255, 255, 0.88));
        padding: 24px 26px;
      }

      .report h1 {
        margin: 0 0 12px;
        font-family: var(--serif);
        font-size: 38px;
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .report p {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 22px;
        line-height: 1.45;
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 16px;
      }

      .stat {
        padding: 16px;
        border-radius: 18px;
        background: #fff;
        border: 1px solid rgba(24, 77, 55, 0.12);
      }

      .stat span {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 14px;
      }

      .stat strong {
        font-size: 28px;
        letter-spacing: -0.03em;
      }

      .bars {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      .bars div {
        height: 18px;
        border-radius: 999px;
        background: rgba(20, 17, 13, 0.08);
        overflow: hidden;
      }

      .bars span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--forest), #2d7e5c);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="window">
        <div class="topbar">
          <div class="brand">
            <strong>QuartoPad</strong>
            <span>Type, render, and review in one place</span>
          </div>

          <div class="steps">
            <div class="step" data-step="type">TYPE</div>
            <div class="step" data-step="render">RENDER</div>
            <div class="step" data-step="output">OUTPUT</div>
          </div>

          <div class="render-pill" id="render-pill">Ready to render</div>
        </div>

        <div class="workspace">
          <section class="pane">
            <div class="pane-head">report.qmd</div>
            <div class="editor-body">
              <pre class="editor-text" id="editor-text"></pre>
            </div>
          </section>

          <section class="pane">
            <div class="pane-head">Rendered preview</div>
            <div class="preview-body">
              <div class="preview-state" id="preview-state"></div>
            </div>
          </section>
        </div>
      </div>
    </div>

    <script>
      const source = `# Weekly Field Report

We reviewed two regions and rendered the latest summary.

\`\`\`{r}
summary(cars)
\`\`\`

- check travel time
- publish html report`;

      function setActive(step) {
        document.querySelectorAll('.step').forEach(element => {
          element.classList.toggle('active', element.dataset.step === step);
        });
      }

      function renderPreview(progress) {
        const preview = document.getElementById('preview-state');
        const pill = document.getElementById('render-pill');

        if (progress < 0.45) {
          setActive('type');
          pill.textContent = 'Draft in progress';
          preview.innerHTML = `
            <div class="waiting">
              <div>
                <strong>Write the source</strong>
                <div>Quarto content appears here after render.</div>
              </div>
            </div>
          `;
          return;
        }

        if (progress < 0.72) {
          setActive('render');
          pill.textContent = 'Rendering html';
          const bar = Math.round(((progress - 0.45) / 0.27) * 100);
          preview.innerHTML = `
            <div class="rendering">
              <div>
                <strong>Render the report</strong>
                <div>Code, prose, and output are being assembled.</div>
                <div class="render-bar"><span style="width:${bar}%"></span></div>
              </div>
            </div>
          `;
          return;
        }

        setActive('output');
        pill.textContent = 'Output ready';
        preview.innerHTML = `
          <div class="report">
            <h1>Weekly Field Report</h1>
            <p>Two regions reviewed. The latest summary is ready to share.</p>
            <div class="stat-grid">
              <div class="stat">
                <span>Trips</span>
                <strong>50</strong>
              </div>
              <div class="stat">
                <span>Avg speed</span>
                <strong>15</strong>
              </div>
              <div class="stat">
                <span>Distance</span>
                <strong>43</strong>
              </div>
            </div>
            <div class="bars">
              <div><span style="width:78%"></span></div>
              <div><span style="width:58%"></span></div>
              <div><span style="width:86%"></span></div>
            </div>
          </div>
        `;
      }

      window.setSceneProgress = function(progress) {
        const editor = document.getElementById('editor-text');
        const typed = Math.max(
          1,
          Math.floor(source.length * Math.min(progress / 0.45, 1))
        );
        const isTyping = progress < 0.45;
        editor.textContent = isTyping ? source.slice(0, typed) : source;
        editor.innerHTML = isTyping
          ? `${editor.textContent}<span class="caret"></span>`
          : editor.textContent;
        renderPreview(progress);
      };

      window.setSceneProgress(0);
    </script>
  </body>
</html>
